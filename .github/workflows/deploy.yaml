name: Deploy to Fly.io

on:
  workflow_run:
    workflows: ["Unit Tests"]
    types: [completed]
    branches: [main]
  workflow_dispatch:
    inputs:
      reason:
        description: "Reason for manual deployment"
        required: false
        default: "Manual deployment"

jobs:
  deploy:
    runs-on: ubuntu-latest
    # Prevent overlapping deploys — concurrent flyctl runs fight for machine leases.
    concurrency:
      group: fly-deploy-tu-tru-api
      cancel-in-progress: false
    # Run on manual dispatch (skip test check) OR after successful test run
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'

    steps:
      - uses: actions/checkout@v4
        with:
          # workflow_run default checkout is not the commit that passed tests
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}

      - uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy to Fly.io
        run: |
          set -euo pipefail
          for attempt in 1 2 3; do
            echo "Deploy attempt ${attempt}/3"
            if flyctl deploy --remote-only; then
              exit 0
            fi
            if [ "${attempt}" -lt 3 ]; then
              echo "Deploy failed; waiting 90s for machine leases to expire before retry..."
              sleep 90
            fi
          done
          exit 1
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
