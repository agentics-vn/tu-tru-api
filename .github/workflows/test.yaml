name: Unit Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: uv sync

      - name: Run unit tests
        env:
          PYTHONPATH: src
        run: uv run pytest tests/unit -q

      - name: Run integration tests
        env:
          PYTHONPATH: src
        run: uv run pytest tests/integration -q
